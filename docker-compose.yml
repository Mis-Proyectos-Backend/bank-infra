services:

  # ==========================
  # MONGODB
  # ==========================
  mongo:
    image: mongo:8
    container_name: mongo-bank
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo-data:/data/db
    networks:
      - bank-network


  # ==========================
  # REDIS
  # ==========================
  redis:
    image: redis:7
    container_name: redis-bank
    ports:
      - "6379:6379"
    networks:
      - bank-network


  # ==========================
  # KAFKA KRAFT
  # ==========================
  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - bank-network


  # ==========================
  # EUREKA SERVER
  # ==========================
  eureka-server:
    build:
      context: ../eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - bank-network


  # ==========================
  # API GATEWAY
  # ==========================
  api-gateway:
    build:
      context: ../api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - eureka-server
    networks:
      - bank-network


  # ==========================
  # CUSTOMER SERVICE
  # ==========================
  customer-service:
    build:
      context: ../customer-service
    container_name: customer-service
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mongo
      - redis
      - eureka-server
    networks:
      - bank-network


  # ==========================
  # ACCOUNT SERVICE
  # ==========================
  account-service:
    build:
      context: ../account-service
    container_name: account-service
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mongo
      - redis
      - kafka
      - eureka-server
    networks:
      - bank-network


  # ==========================
  # CREDIT SERVICE
  # ==========================
  credit-service:
    build:
      context: ../credit-service
    container_name: credit-service
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mongo
      - eureka-server
    networks:
      - bank-network


  # ==========================
  # MOVEMENT SERVICE
  # ==========================
  movement-service:
    build:
      context: ../movement-service
    container_name: movement-service
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mongo
      - kafka
      - eureka-server
    networks:
      - bank-network


  # ==========================
  # DEBIT CARD SERVICE
  # ==========================
  debit-card-service:
    build:
      context: ../debit-card-service
    container_name: debit-card-service
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mongo
      - kafka
      - eureka-server
    networks:
      - bank-network


  # ==========================
  # YANKI SERVICE
  # ==========================
  yanki-service:
    build:
      context: ../yanki-service
    container_name: yanki-service
    ports:
      - "8087:8087"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - mongo
      - kafka
      - eureka-server
    networks:
      - bank-network


# ==========================
# VOLUMES
# ==========================
volumes:
  mongo-data:


# ==========================
# NETWORK
# ==========================
networks:
  bank-network:
    driver: bridge